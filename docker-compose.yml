version: "3.9"

services:

  db:
    image: postgres:15
    container_name: ai_analyzer_db
    env_file:
      - .env                          # ← reads from .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ai_analyzer_app
    ports:
      - "8000:8000"
    env_file:
      - .env                          # ← reads from .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: